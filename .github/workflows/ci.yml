name: CI

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: j178/prek-action@v2

  test-top-level-build-testing:
    name: Top-level build testing [${{ matrix.os }}]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Configure (PIXI_CMAKE_BUILD_TESTING=ON)
        run: cmake -S . -B build_top_level -DPIXI_CMAKE_BUILD_TESTING=ON

      - name: Build
        run: cmake --build build_top_level

      - name: Test
        run: ctest --test-dir build_top_level --output-on-failure

  test-bootstrap:
    name: Bootstrap [${{ matrix.os }}]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Configure (triggers pixi_bootstrap)
        run: cmake -S tests/test_bootstrap -B build_bootstrap

  test-install-deps:
    name: Install deps [${{ matrix.os }}]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Configure (triggers pixi_install_dependencies)
        run: cmake -S tests/test_boost -B build

      - name: Build
        run: cmake --build build

  test-inline-deps:
    name: Inline deps [${{ matrix.os }}]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Configure (triggers pixi_dependencies)
        run: cmake -S tests/test_inline_dependencies -B build_inline

      - name: Build
        run: cmake --build build_inline

  test-inline-deps-dev:
    name: Inline deps dev env [${{ matrix.os }}]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Configure (triggers pixi_dependencies with ENVIRONMENT)
        run: cmake -S tests/test_inline_dependencies_dev -B build_inline_dev

      - name: Build
        run: cmake --build build_inline_dev

  test-inline-deps-defaults:
    name: Inline deps defaults [${{ matrix.os }}]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Configure (triggers pixi_dependencies defaults)
        run: cmake -S tests/test_inline_dependencies_defaults -B build_inline_defaults

      - name: Build
        run: cmake --build build_inline_defaults
